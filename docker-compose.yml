version: '3.8'

services:
  # Redis — used by Celery broker and Django Channels
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # PostgreSQL — production database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ids_db
      POSTGRES_USER: ids_user
      POSTGRES_PASSWORD: ids_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:
